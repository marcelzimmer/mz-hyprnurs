name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # ─────────────────────────────────────────────
  # Linux (Omarchy / Arch-basiert, x86_64)
  # Packt Binary + icon.png → wird vom PKGBUILD erwartet
  # ─────────────────────────────────────────────
  build-linux:
    name: Build Linux (x86_64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libssl-dev \
            libgtk-3-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxkbcommon-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Build
        run: cargo build --release --target x86_64-unknown-linux-gnu

      - name: Package
        run: |
          mkdir -p dist
          cp target/x86_64-unknown-linux-gnu/release/mz-hyprnurs dist/
          cp assets/icon.png dist/
          cp install.sh dist/
          cd dist
          zip mz-hyprnurs-linux-x86_64.zip mz-hyprnurs icon.png install.sh

      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: dist/mz-hyprnurs-linux-x86_64.zip

  # ─────────────────────────────────────────────
  # macOS 26+ (Apple Silicon / aarch64)
  # Erstellt ein .app-Bundle mit Icon und Info.plist
  # ─────────────────────────────────────────────
  build-macos:
    name: Build macOS (Apple Silicon)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Build
        run: cargo build --release --target aarch64-apple-darwin

      - name: Sync version from git tag into Info.plist
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $VERSION" assets/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $VERSION" assets/Info.plist

      - name: Create .app bundle
        run: |
          BUNDLE="MZ-HyprNurs.app"

          rm -rf "$BUNDLE"
          mkdir -p "$BUNDLE/Contents/MacOS"
          mkdir -p "$BUNDLE/Contents/Resources"

          # Binary-Name muss mit CFBundleExecutable in Info.plist übereinstimmen
          cp target/aarch64-apple-darwin/release/mz-hyprnurs "$BUNDLE/Contents/MacOS/mz-hyprnurs"
          cp assets/icon.icns "$BUNDLE/Contents/Resources/icon.icns"
          cp assets/Info.plist "$BUNDLE/Contents/Info.plist"

          zip -r mz-hyprnurs-macos-aarch64.zip "$BUNDLE"

      - uses: actions/upload-artifact@v4
        with:
          name: macos
          path: mz-hyprnurs-macos-aarch64.zip

  # ─────────────────────────────────────────────
  # Windows 10+ (x86_64)
  # Icon wird via build.rs + winresource in die .exe eingebettet
  # ─────────────────────────────────────────────
  build-windows:
    name: Build Windows (x86_64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Build
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item target\x86_64-pc-windows-msvc\release\mz-hyprnurs.exe dist\
          Compress-Archive -Path dist\mz-hyprnurs.exe -DestinationPath mz-hyprnurs-windows-x86_64.zip

      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: mz-hyprnurs-windows-x86_64.zip

  # ─────────────────────────────────────────────
  # GitHub Release erstellen mit allen Binaries
  # ─────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [build-linux, build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            mz-hyprnurs-linux-x86_64.zip
            mz-hyprnurs-macos-aarch64.zip
            mz-hyprnurs-windows-x86_64.zip
